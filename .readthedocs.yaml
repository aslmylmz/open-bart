# Read the Docs configuration file for the Dynamic Hazard Rate BART.
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details.

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py
  # The docs build is warning-clean; fail the RTD build on any new warning so
  # regressions (orphaned pages, broken cross-references) are caught in CI.
  fail_on_warning: true

python:
  install:
    - requirements: docs/requirements.txt
