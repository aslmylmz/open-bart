name: JOSS paper (draft PDF)

# Compiles paper/paper.md with the Open Journals toolchain (the same pipeline
# JOSS runs at submission) and uploads the PDF as a build artifact, so every
# change to the manuscript is proofread against the real renderer (issue 33).

on:
  push:
    branches: [feat/standalone-instrument, main]
    paths:
      - "paper/**"
      - ".github/workflows/paper.yml"
  workflow_dispatch:

jobs:
  draft-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper/paper.md

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: joss-paper
          path: paper/paper.pdf
          if-no-files-found: error
